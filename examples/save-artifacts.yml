# CostGuard — Save Artifacts
#
# Upload the HTML report and JSON result as workflow artifacts

name: CostGuard
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: |
          terraform init
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json
      - uses: actions/upload-artifact@v4
        with:
          name: plan
          path: plan.json

  cost-review:
    needs: terraform-plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plan

      - uses: skyxops-io/costguard-action@v1
        id: costguard
        with:
          plan-path: plan.json
          api-key: ${{ secrets.COSTGUARD_API_KEY }}
          budget-code: ${{ secrets.COSTGUARD_BUDGET_CODE }}

      # Use outputs from the action
      - run: |
          echo "Decision: ${{ steps.costguard.outputs.decision }}"
          echo "Monthly cost: ${{ steps.costguard.outputs.monthly-cost }}"

      # Upload reports as workflow artifacts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: costguard-reports
          path: |
            costguard-result.json
            costguard-report.html
          retention-days: 30
