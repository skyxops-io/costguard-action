# ──────────────────────────────────────────────────────────────
# GCP Terraform — Single Project Deployment
# ──────────────────────────────────────────────────────────────
#
# Scenario: Platform team deploys GKE clusters, Cloud SQL instances,
#           and VPC networks to a single GCP project using Workload
#           Identity Federation (no long-lived service account keys).
#
# Pipeline:
#   On PR:    checkout → terraform plan → CostGuard cost review
#   On merge: checkout → terraform plan → terraform apply
#
# Secrets needed:
#   COSTGUARD_API_KEY          — CostGuard API key
#   COSTGUARD_BUDGET_CODE      — Budget code from CostGuard dashboard
#   GCP_WORKLOAD_IDENTITY_PROVIDER — projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   GCP_SERVICE_ACCOUNT        — terraform@<project>.iam.gserviceaccount.com

name: "Infrastructure: GCP Plan, Review & Deploy"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_ROOT: terraform/environments/production
  GCP_PROJECT_ID: myorg-production-infra
  GCP_REGION: us-central1

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-production
          path: ${{ env.TF_ROOT }}/plan.json
          retention-days: 5

  cost-review:
    name: "CostGuard: Cost Review"
    needs: terraform-plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-production

      - name: Run CostGuard
        uses: skyxops-io/costguard-action@v1
        with:
          plan-path: plan.json
          api-key: ${{ secrets.COSTGUARD_API_KEY }}
          budget-code: ${{ secrets.COSTGUARD_BUDGET_CODE }}

  deploy:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve
